name: soar-task-planner
channels:
  - pytorch
  - conda-forge
  - defaults
dependencies:
  - python=3.11
  - pip

  # Core
  - numpy>=1.24.0
  - pillow>=10.0.0
  - pip:
    - torch>=2.7.0
    - torchvision>=0.18.0
  - pyyaml>=6.0
  - pip:
    - opencv-python>=4.8.0

  # RUGD dataset download
  - pip:
    - dataset-tools>=0.1.0

  # SAM3 via HuggingFace Transformers
  - pip:
    - transformers>=5.0.0
    - accelerate>=0.30.0

  # IntroPlan baseline (Anthropic or OpenAI)
  - pip:
    - anthropic>=0.40.0
    - openai>=1.30.0
    - python-dotenv>=1.0.0,<1.0.2

  # Metrics and utilities
  - pip:
    - scikit-learn>=1.3.0
    - matplotlib>=3.7.0
    - tqdm>=4.66.0

  # Testing
  - pip:
    - pytest>=7.4.0
    - pytest-mock>=3.11.0